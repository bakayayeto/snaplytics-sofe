<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1260" font-family="system-ui,Segoe UI,sans-serif">
  <defs>
    <style>
      .t{font-size:15px;fill:#1a1a2e}
      .h{font-size:20px;font-weight:700;fill:#16213e}
      .s{font-size:12px;fill:#4a5568}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:8}
      .acc{fill:#0f766e}
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#334155"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#e2e8f0"/>
  <text x="450" y="36" text-anchor="middle" class="h">heuristic_renewal_probability - Dustin Dwayne Diaz</text>
  <text x="450" y="58" text-anchor="middle" class="s">Five listed sessions; as-of 2026-05-16 for trailing-365 (same rule as recompute_customer_renewal_profile)</text>

  <g id="step1" opacity="0">
    <rect x="24" y="78" width="852" height="200" class="box"/>
    <text x="40" y="102" class="h" font-size="16">1) Raw bookings (BOOKED / Ongoing)</text>
    <text x="40" y="128" class="t">2026-03-03 - Adore - PHP 899</text>
    <text x="40" y="150" class="t">2025-01-25 - Allure - PHP 819</text>
    <text x="40" y="172" class="t">2024-06-05 - Ecstasy - PHP 299</text>
    <text x="40" y="194" class="t">2024-06-01 - Delight - PHP 549</text>
    <text x="40" y="216" class="t">2024-05-29 - Delight - PHP 549</text>
    <text x="40" y="244" class="s">Sum PHP 3115, n=5. Sorted unique dates: gaps include 3d,4d,...,234d; renewed_within_366 = true</text>
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="0s"/>
  </g>

  <g id="step2" opacity="0">
    <path d="M450 278 L450 308" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="24" y="312" width="852" height="168" class="box"/>
    <text x="40" y="338" class="h" font-size="16">2) Aggregate to Renewal row (recompute_customer_renewal_profile)</text>
    <text x="40" y="364" class="t">total_bookings = 5</text>
    <text x="40" y="386" class="t">avg_booking_value = 3115 / 5 = 623.0</text>
    <text x="40" y="408" class="t">booking_frequency = count(session_date &gt;= 2025-05-16) = 1 (only 2026-03-03 in trailing year)</text>
    <text x="40" y="430" class="t">renewed_within_366 = True</text>
    <text x="40" y="452" class="t">total_spent = 3115; preferred_package_type = most common package.category (example: Regular)</text>
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="0.7s"/>
  </g>

  <g id="step3" opacity="0">
    <path d="M450 480 L450 510" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="24" y="514" width="852" height="300" class="box"/>
    <text x="40" y="542" class="h" font-size="16">3) heuristic_renewal_probability(renewal) - additive caps then clamp [0,0.99]</text>
    <text x="40" y="570" class="t">base = 0.05</text>
    <text x="40" y="594" class="t">+ min(booking_frequency / 8, 0.4) = min(0.125, 0.4) = 0.125</text>
    <text x="40" y="618" class="t">+ min(total_bookings / 10, 0.25) = min(0.5, 0.25) = 0.25</text>
    <text x="40" y="642" class="t">+ min(avg_booking_value / 15000, 0.15) = min(0.0415333..., 0.15) = 0.0415333...</text>
    <text x="40" y="666" class="t">+ (renewed_within_366 ? 0.15 : 0) = 0.15</text>
    <text x="40" y="698" class="t" font-weight="700">raw sum = 0.6165333333333333</text>
    <text x="40" y="726" class="acc" font-size="17" font-weight="700">final = min(raw, 0.99) = 0.6165333333333333 (~0.6165 at 4dp)</text>
    <text x="40" y="758" class="s">Source: Snaplytics/backend/renewal_utils.py</text>
    <text x="40" y="780" class="s">Production uses timezone.now().date() - 365d; explainer fixes today = 2026-05-16.</text>
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="1.4s"/>
  </g>

  <g id="bar" opacity="0">
    <text x="40" y="860" class="h" font-size="15">Contribution stack (height proportional to value)</text>
    <rect x="40" y="882" width="60" height="20" fill="#94a3b8"/><text x="70" y="928" text-anchor="middle" class="s">0.05</text>
    <rect x="110" y="837" width="60" height="65" fill="#64748b"/><text x="140" y="928" text-anchor="middle" class="s">0.125</text>
    <rect x="180" y="837" width="60" height="65" fill="#475569"/><text x="210" y="928" text-anchor="middle" class="s">0.25</text>
    <rect x="250" y="888" width="60" height="14" fill="#334155"/><text x="280" y="928" text-anchor="middle" class="s">0.042</text>
    <rect x="320" y="837" width="60" height="65" fill="#0f766e"/><text x="350" y="928" text-anchor="middle" class="s">0.15</text>
    <text x="420" y="910" class="t">sum 0.6165 &lt; 0.99 so final stays 0.6165</text>
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.2s"/>
  </g>
</svg>
