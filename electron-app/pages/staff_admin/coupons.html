<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Heigen Studio</title>
        <script>
            (function redirectHiddenPage() {
                var inEmbed = false;
                try {
                    inEmbed =
                        new URLSearchParams(window.location.search).get("embed") ===
                            "1" || window.self !== window.top;
                } catch (_) {}
                var target = inEmbed
                    ? "./dashboard.html?embed=1"
                    : "./shell.html?page=dashboard.html";
                window.location.replace(target);
            })();
        </script>
    </head>
    <body></body>
</html>
